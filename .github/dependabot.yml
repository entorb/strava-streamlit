version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: ⬆
    labels:
      - "dependencies"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
    ignore:
      - dependency-name: "pre-commit"
      - dependency-name: "pytest"
      - dependency-name: "pytest-cov"
      - dependency-name: "ruff"
    commit-message:
      prefix: ⬆
    labels:
      - "dependencies"
